<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="img/favicon.ico">
    <link rel="icon" href="img/favicon.ico">

    <title>Smart Segment Prompter - Aplica la IA</title>
    <link rel="stylesheet" href="css/prompter.css">

    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.min.js"></script>

</head>

<body>
    <div id="pwa-boot-screen"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0a; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-family:sans-serif;">
        <h1 style="color:#add8e6; margin-bottom:5px;">AIA Prompter PWA</h1>
        <p style="color:#666; font-size:0.9rem; margin-bottom:30px;">Modo Aislado (Tablet/Móvil)</p>

        <label for="json-upload-input"
            style="background:#1a1a1a; border:2px dashed #4fc3f7; padding:40px 60px; border-radius:12px; cursor:pointer; font-size:1.1rem; color:#4fc3f7; transition:all 0.2s;">
            📥 Cargar Guion (.json)
        </label>
        <input type="file" id="json-upload-input" accept=".json" style="display:none;">
    </div>


    <div id="setup-view">
        <div class="document-panel">
            <div class="header-controls">
                <div class="header-left">
                    <a href="https://www.youtube.com/channel/UCsLbSODWnK5I896EToRb12Q" target="_blank"
                        title="Visitar Aplica la IA" class="logo-link">
                        <img src="img/favicon.ico" alt="Aplica la IA">
                    </a>

                    <div id="custom-speaker-select" class="btn-custom-file"
                        style="position:relative; background:var(--bg-panel); color:var(--text-main); border:1px solid var(--border-color); cursor:pointer; min-width:200px; padding:5px 10px; user-select:none;">
                        <div id="speaker-select-label"
                            style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">Selecciona Hablante...
                        </div>
                    </div>
                </div>
                <div class="header-right">
                    <button class="icon-btn" id="btn-import-new" title="Importar nuevo guion (.json)">📂</button>

                    <button class="icon-btn" id="btn-undo" title="Deshacer edición (Ctrl+Z)">↩️</button>
                    <button class="icon-btn" id="btn-save" title="Guardar Proyecto Como... (.json)">💾</button>

                    <button class="icon-btn" id="btn-refresh"
                        title="Recargar texto original (Borra selecciones)">🔄</button>
                    <button class="icon-btn" id="btn-clear" title="Limpiar todo (Borra el autoguardado)">🗑️</button>
                    <div class="global-stats" id="global-stats-header">0 car. | ~0s</div>
                </div>
            </div>
            <div id="text-container" contenteditable="true" spellcheck="false">
                Selecciona un proyecto y uno o varios hablantes para empezar...</div>
        </div>

        <div class="sidebar-panel">
            <div class="sidebar-header">
                <h3 style="margin: 0 0 10px 0;">🏷️ Tarjetas Generadas</h3>
                <div class="global-stats" id="global-stats-sidebar">Tarjetas: 0</div>
                <div style="display: flex; gap: 8px; margin-bottom: 10px; margin-top: 10px; align-items: center;">
                    <select id="sidebar-sorter"
                        style="flex-grow: 1; padding: 4px 8px; height: 32px; background: var(--bg-input); color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box;">
                        <option value="sync">Orden Sincronizado</option>
                        <option value="manual">Orden Actual / Manual</option>
                        <option value="number">Por Número de Tarjeta</option>
                        <option value="speaker">Por Hablante</option>
                        <option value="status">Por Estado (Pendientes primero)</option>
                        <option value="modified">Por Modificados (Primero)</option>
                    </select>
                    <button class="icon-btn" id="btn-refresh-sorter" title="Actualizar filtro"
                        style="width: 32px; height: 32px; font-size: 16px; padding: 0; display: flex; align-items: center; justify-content: center; box-sizing: border-box;">↻</button>
                </div>
                <button id="btn-start">▶ Iniciar Modo Grabación</button>
            </div>
            <div id="cards-list"></div>
        </div>
    </div>

    <!-- Modal de selección de hablantes -->
    <div id="speaker-modal-overlay"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:500; align-items:center; justify-content:center;">
        <div id="speaker-modal-content"
            style="background:var(--bg-panel); border:1px solid var(--border-color); border-radius:8px; padding:0; min-width:300px; max-width:420px; width:90%; box-shadow:0 8px 24px rgba(0,0,0,0.5); display:flex; flex-direction:column; max-height:80vh;">
            <!-- Cabecera fija -->
            <div
                style="display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border-color); flex-shrink:0;">
                <span style="font-weight:bold; font-size:0.95rem; color:var(--text-main);">Seleccionar Hablantes</span>
                <button id="btn-close-speaker-modal"
                    style="background:none; border:none; color:var(--text-main); cursor:pointer; font-size:1.1rem; opacity:0.7; line-height:1;">✖</button>
            </div>
            <!-- Herramientas de selección masiva -->
            <div
                style="padding:10px 16px; display:flex; gap:10px; border-bottom:1px solid #333; background:rgba(255,255,255,0.03);">
                <button id="btn-speakers-all"
                    style="background:#333; border:1px solid #555; color:#eee; padding:4px 12px; border-radius:4px; font-size:0.8rem; cursor:pointer;">Todos</button>
                <button id="btn-speakers-none"
                    style="background:#333; border:1px solid #555; color:#eee; padding:4px 12px; border-radius:4px; font-size:0.8rem; cursor:pointer;">Ninguno</button>
            </div>
            <!-- Lista de checkboxes (se puebla via JS) -->
            <div id="speaker-modal-list" style="overflow-y:auto; padding:10px 16px; flex:1;"></div>
        </div>
    </div>

    <div id="prompter-view">
        <div id="prompter-top-metadata"
            style="position: absolute; top: 3vh; left: 50%; transform: translateX(-50%); color: #999; font-size: 2vh; font-weight: bold; z-index: 50; pointer-events: none; text-align: center; width: 90%; opacity: 0.85; font-family: sans-serif;">
        </div>
        <div class="touch-zone" id="zone-left" title="Atrás (Click)">
            <div class="zone-btn-top" id="btn-exit-prompter" title="Salir de grabación">✖</div>
            &lt;
        </div>
        <div id="prompter-text" contenteditable="true" spellcheck="false"></div>
        <div id="progress-indicator"></div>
        <div class="touch-zone" id="zone-right" title="Siguiente (Click)">
            <div class="zone-btn-top" id="btn-menu-prompter" title="Lista de tarjetas">☰</div>
            <div class="zone-btn-top" id="btn-font-prompter" title="Tamaño de texto">Aa</div>
            <div class="zone-btn-top" id="btn-align-prompter" title="Alineación (Centro/Izq/Der/Justificado)">≡</div>
            <div class="zone-btn-top" id="btn-toggle-completed" title="Marcar como Completado" style="top: 185px;">✓
            </div>
            &gt;
        </div>

        <div id="font-slider-panel">
            A- <input type="range" id="font-size-slider" min="4" max="15" step="0.5" value="8"> A+
            <span id="zoom-value-display" style="margin-left: 10px; min-width: 35px; text-align: right;">8.0</span>
        </div>
    </div>

    <div id="jump-menu-overlay">
        <div class="jump-menu-container">
            <div class="jump-header"><span>Selecciona una tarjeta para saltar</span><button class="btn-close-menu"
                    id="btn-close-jump">✖</button></div>
            <div class="jump-list-content" id="jump-list-content"></div>
        </div>
    </div>
    <div id="autosave-indicator">Guardado automáticamente ✓</div>

    <!-- Custom System Dialog -->
    <div class="modal-overlay" id="sys-dialog-overlay"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
        <div class="modal-content"
            style="background:var(--bg-panel); border:1px solid var(--border-color); border-radius:8px; padding:24px; max-width:400px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.8);">
            <div id="sys-dialog-icon" style="font-size:2.5rem; margin-bottom:12px;">❓</div>
            <h3 id="sys-dialog-title" style="margin:0 0 12px 0; font-size:1.1rem; color:var(--text-main);"></h3>
            <p id="sys-dialog-message" style="font-size:0.9rem; color:#aaa; margin:0 0 20px 0; line-height:1.4;"></p>
            <div style="display:flex; gap:12px; justify-content:center;" id="sys-dialog-btns"></div>
        </div>
    </div>

    <div id="mobile-tabs-nav" style="display: none;">
        <button class="mobile-tab-btn active" data-target=".document-panel">📝 Guion</button>
        <button class="mobile-tab-btn" data-target=".sidebar-panel">🏷️ Tarjetas</button>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>

</html>
